<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Défi Photo - Hélène & Jimmy</title>

<link rel="stylesheet" href="style.css">

<script defer src="script.js"></script>

</head>

<body>


<header class="hero">

<h1>💍 Hélène & Jimmy</h1>

<p class="date">24 octobre 2026</p>

<h2>Bienvenue au Grand Défi Photo !</h2>

<p>
Scannez, photographiez, amusez-vous et faites gagner votre table !
</p>


<div id="table"></div>

<div id="score"></div>


<a href="#defis" class="btn">
Commencer le défi
</a>


</header>



<main>


<section id="defis-section">


<h2>🏆 Les défis</h2>


<div id="defis" class="defis">


</div>


</section>





<section id="upload">


<h2>📸 Envoyer vos photos</h2>


<form>


<label>Votre table</label>


<select id="choixTable">

<option>Table 1</option>
<option>Table 2</option>
<option>Table 3</option>
<option>Table 4</option>
<option>Table 5</option>
<option>Table 6</option>
<option>Table 7</option>
<option>Table 8</option>

</select>


<br><br>


<label>Choisissez vos photos</label>


<input
type="file"
multiple
accept="image/*">


<br><br>


<button type="submit">

📤 Envoyer

</button>


</form>


</section>



</main>



<footer>

<p>
Avec ❤️ pour le mariage d'Hélène & Jimmy
</p>

</footer>



</body>

</html>
